version: "3.8"

services:
  app:
    image: ubaidullah244/yii2-app:latest
    ports:
      - "8080:80"
    networks:
      - yii-net
    volumes:
      - app-data:/var/www/html
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - yii-net
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

networks:
  yii-net:

volumes:
  app-data:
